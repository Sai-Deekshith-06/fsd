<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .card {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 12px;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: auto;
            box-sizing: border-box;
        }

        /* Tablet */
        @media screen and (max-width: 1024px) {
            .card {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Mobile */
        @media screen and (max-width: 768px) {
            .card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<!-- 
Requirements 
Display 8 images. 
Desktop: 
4 columns 
Tablet: 
2 columns 
Mobile: 
1 column 
Concepts 
• CSS Grid  
• Media Queries 
-->

<body>
    <div class="card">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
        <img src="images/1.jpg">
    </div>
</body>

</html>
