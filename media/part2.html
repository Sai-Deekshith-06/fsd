<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn-5 {
            background-color: blue;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.5s;
        }

        .btn-5:hover {
            background-color: green;
        }

        .card {
            margin: 20px;
            background-color: #57535399;
            padding: 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 200px;
            height: 200px;
        }

        .card:hover {
            width: 250px;
            height: 250px;
            transition: all 0.3s ease;
        }

        header {
            background-color: #060606;
            padding: 8px;
            color: #fff;
            margin-right: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .navbar {
            display: flex;
            gap: 8px;
        }

        .navbar a {
            color: #fff;
            padding: 8px;
            font-size: 16px;
            text-decoration: none;
            width: 100px;
        }

        .navbar a:hover {
            color: #ff0000;
            font-size: 18px;
            padding: 6px;
            text-decoration: underline;
            transition: all 0.3s ease;
        }

        img {
            transition: all 0.3s ease;
        }

        img:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <button class="btn-5">
        Submit
    </button>
    <hr>
    <div class="card">
        <p>Card</p>
    </div>
    <hr>
    <header>
        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <hr>
    <img src="images/1.jpg" width="100px" height="100px">
    <hr>
</body>

</html>
