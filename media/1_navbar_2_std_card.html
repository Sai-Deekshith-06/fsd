<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #33332256;
        }

        header {
            background-color: #fff;
            padding: 8px;
            color: #060606;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-right: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .navbar {
            display: flex;
            gap: 8px;
        }

        .navbar a {
            color: #060606;
            padding: 8px;
            font-size: 16px;
            text-decoration: none;
        }

        /* Mobile */

        @media screen and (max-width: 768px) {

            header,
            .navbar {
                flex-direction: column;
                align-items: center;
            }

            .navbar a {
                padding: 6px;
                font-size: 18px;
            }

            .profile_card {
                flex-direction: column;
                align-items: center;
                width: 90%;
                max-width: 350px;
                padding: 16px;
                text-align: center;
            }

            .profile_card img {
                width: 100px;
                height: 100px;
                box-sizing: border-box;
            }

            main {
                align-items: center;
                justify-content: center;
            }
        }

        /* Desktop */
        @media screen and (min-width: 769px) {
            .navbar {
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }
        }

        main {
            display: flex;
            justify-content: start;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
            align-items: start;
            height: 86.5vh;
            /* box-sizing: border-box; */
            background-color: #f6f6f699;
        }

        .profile_card {
            background-color: #fff;
            padding: 16px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 1900px;
            box-sizing: border-box;
            justify-content: start;
        }

        .profile_card img {
            border-radius: 15%;
            width: 150px;
            height: 150px;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>Student Portal</h1>
        </div>
        <nav class="navbar">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <main>
        <div class="profile_card">
            <img src="images/1.jpg" alt="Profile Picture">
            <div class="details">
                <h3>John Doe</h3>
                <p>Computer Science</p>
                <small>johndoe@gmail.com</small>
            </div>
        </div>
        <hr>
        <div class="profile_card">
            <img src="images/2.png" alt="Profile Picture">
            <div class="details">
                <h3>John Doe</h3>
                <p>Computer Science</p>
                <small>johndoe@gmail.com</small>
            </div>
        </div>
    </main>
</body>

</html>
