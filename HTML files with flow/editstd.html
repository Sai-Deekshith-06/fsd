<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="css.css">
</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstd.html">Add Student</a>
        <a href="viewstd.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>
    <form action="viewstd.html">
        <label for="name">Name:
            <input type="text" id="name" name="name" value="nani" required>
        </label><br><br>
        <label for="rollno">Roll no:
            <input type="text" id="rollno" name="rollno" value="6790" required>
        </label><br><br>
        <label for="branch">Branch:
            <input type="text" id="branch" name="branch" value="CSD" required>
        </label><br><br>
        <label for="cgpa">CGPA:
            <input type="number" step="0.01" id="cgpa" name="cgpa" value="7.9" required>
        </label><br><br>
        <button type="submit">Update</button>
    </form>
</body>

</html>
