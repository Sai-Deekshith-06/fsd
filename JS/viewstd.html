    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert("Please login first!");
            window.location.href = "login.html";
        }
        const handleDelete = (rollno) => {
            var students = JSON.parse(localStorage.getItem('students')) || [];
            delete students[rollno];
            localStorage.setItem('students', JSON.stringify(students));
            alert("Student deleted successfully!");
            location.reload();
        }
        const displayStudents = () => {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const stdTable = document.getElementById('students-list');
            const stds = Object.keys(students)
            stdTable.innerHTML = stds.length > 0 ? `${stds.map((rollno, index) => {
                const { name, branch, cgpa } = students[rollno];
                return `<tr onclick="window.location.href='profile.html?rollno=${rollno}'">
                        <td>${index + 1}</td>
                        <td>${name}</td>
                        <td>${rollno}</td>
                        <td>${branch}</td>
                        <td class="num">${cgpa}</td>
                    </tr>`;
            }).join('')}` : `<tr><td colspan="7">No students found. Please add some students.</td></tr>`;
        }
        window.onload = displayStudents;
    </script>
