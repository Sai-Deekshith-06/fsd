<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css.css">
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert("Please login first!");
            window.location.href = "login.html";
        }
        const handleSubmit = (event) => {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const rollno = document.getElementById('rollno').value;
            const branch = document.getElementById('branch').value;
            const cgpa = document.getElementById('cgpa').value;
            var students = JSON.parse(localStorage.getItem('students')) || {};
            students[rollno] = { name, branch, cgpa };
            localStorage.setItem('students', JSON.stringify(students));
            alert(`Student ${name} added successfully!`);
            window.location.href = "viewstd.html";
        }
    </script>
</head>

<body>
    <div class="hidden bg-primary text-white p-3 d-flex justify-content-between align-items-start">
        <div class="container-fluid d-flex justify-content-start align-items-center">
            <i class="bi bi-building me-3" style="font-size: 2rem;"></i>
            <h1>Student Management Portal</h1>
        </div>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <div class="dropdown d-lg-none">
                    <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Menu
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
                        <li><a class="dropdown-item" href="addstd.html">Add Student</a></li>
                        <li><a class="dropdown-item" href="viewstd.html">View Student</a></li>
                        <li><a class="dropdown-item" href="logout.html">Logout</a></li>
                    </ul>
                </div>
                <div class="d-none d-lg-block">
                    <ul class="navbar-nav d-flex flex-row gap-3">
                        <li class="nav-item">
                            <a class="nav-link text-nowrap" href="dashboard.html">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-nowrap active" href="addstd.html">Add Student</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-nowrap" href="viewstd.html">View Student</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-nowrap" href="logout.html">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <form class="w-25 mx-auto mt-4 p-4 border rounded-4 bg-white" onsubmit="handleSubmit(event)">
        <div class="mb-3">
            <label for="name" class="form-label">
                Name
            </label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="rollno" class="form-label">
                Roll no
            </label>
            <input type="text" id="rollno" name="rollno" class="form-control" maxlength="4" minlength="4"
                pattern="[0-9]{2}[0-9A-Z]{2}" required>
        </div>
        <div class="mb-3">
            <label for="branch" class="form-label">
                Branch
            </label>
            <input type="text" id="branch" name="branch" class="form-control" pattern="[A-Z]{3,4}" required>
        </div>
        <div class="mb-3">
            <label for="cgpa" class="form-label">
                CGPA
            </label>
            <input type="number" step="0.01" id="cgpa" name="cgpa" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            Add
        </button>
    </form>
</body>

</html>
