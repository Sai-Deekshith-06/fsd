<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css.css">
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            window.location.href = "dashboard.html";
        }
        const handleSubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('id').value;
            const password = document.getElementById('password').value;
            var users = localStorage.getItem('users');
            if (!users) {
                alert("No users found! Please register first.");
                return;
            }
            users = JSON.parse(users);
            const user = users[id];
            if (!user || user.password !== password) {
                alert("Invalid username/email or password!");
                return;
            }
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = "dashboard.html";
        }
    </script>
</head>

<body>
    <div class="bg-primary text-white p-3 d-flex justify-content-between align-items-start">
        <div class="container-fluid d-flex justify-content-start align-items-center">
            <i class="bi bi-building me-3" style="font-size: 2rem;"></i>
            <h1>Student Management Portal</h1>
        </div>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <div class="dropdown d-lg-none">
                    <button class="btn btn-primary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Menu
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="login.html">Login</a></li>
                        <li><a class="dropdown-item" href="register.html">Sign Up</a></li>
                    </ul>
                </div>
                <div class="d-none d-lg-block">
                    <ul class="navbar-nav d-flex flex-row gap-3">
                        <li class="nav-item">
                            <a class="nav-link text-nowrap active" href="login.html">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-nowrap" href="register.html">Sign Up</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card border-0 shadow rounded-4 overflow-hidden">
                    <div class="bg-primary text-white text-center py-5">
                        <i class="bi bi-person-circle display-3 mb-3"></i>
                        <h2 class="fw-bold mb-0">
                            Welcome Back
                        </h2>
                        <p class="mb-0 opacity-75">
                            Login to continue
                        </p>
                    </div>
                    <div class="card-body p-4">
                        <form action="dashboard.html" onsubmit="handleSubmit(event)">
                            <div class="mb-3">
                                <label for="id" class="form-label fw-semibold">
                                    Username / Email
                                </label>
                                <input type="text" id="id" name="username" class="form-control form-control-lg"
                                    placeholder="Enter username or email" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">
                                    Password
                                </label>
                                <input type="password" id="password" name="password"
                                    class="form-control form-control-lg" placeholder="Enter password" minlength="6"
                                    required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="bi bi-box-arrow-in-right"></i>
                                Login
                            </button>
                        </form>
                        <p class="text-center mt-4 mb-0 text-muted">
                            Don't have an account?
                            <a href="register.html" class="text-decoration-none fw-semibold">
                                Register
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
